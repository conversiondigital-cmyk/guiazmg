name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: guiazmg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://root:root@localhost:5432/guiazmg_test
      AUTH_SECRET: test-secret-at-least-32-chars-long-ci
      AUTH_URL: http://localhost:3100
      NEXT_PUBLIC_URL: http://localhost:3100
      NEXT_PUBLIC_APP_URL: http://localhost:3100
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma validate

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      # Guard against a missing/incomplete baseline migration: a fresh DB must
      # end up with the full schema, not just indexes. Fails fast with a clear
      # message instead of a confusing downstream seed error.
      - name: Verify schema was created
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -A -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE';")
          echo "Tablas creadas en BD vacía: $COUNT"
          if [ "$COUNT" -lt 50 ]; then
            echo "ERROR: se esperaban >=50 tablas (56 modelos); solo hay $COUNT. ¿Falta la migración baseline?"
            exit 1
          fi

      - run: npx prisma db seed

      - run: npm run lint -- --max-warnings 0

      - run: npm run typecheck

      - run: npm run test -- --run

      - run: npm run build
